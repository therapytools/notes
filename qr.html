<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Calendar Appointment</title>
    <link href="./dist/output.css" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #1f2937;
            margin: 0;
            padding: 2rem 1rem;
            min-height: 100vh;
        }

        .page {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 900;
            margin: 0 0 2rem 0;
            text-align: center;
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            padding: 2.5rem;
            backdrop-filter: blur(10px);
        }

        .layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2.5rem;
            align-items: start;
        }

        @media (min-width: 900px) {
            .layout {
                grid-template-columns: 1fr 1fr;
            }
        }

        label {
            display: block;
            font-weight: 700;
            margin-top: 1.25rem;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
            color: #374151;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        label:first-child {
            margin-top: 0;
        }

        input,
        select {
            width: 100%;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 0.875rem 1rem;
            font-size: 1rem;
            background: #ffffff;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
            background: #f8f9ff;
        }

        input[readonly] {
            background: #f9fafb;
            color: #6b7280;
        }

        .small {
            font-size: 0.85rem;
            color: #6b7280;
            margin-top: 0.75rem;
            line-height: 1.5;
            font-style: italic;
        }

        .left-section {
            display: flex;
            flex-direction: column;
        }

        .right-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #qrcode {
            min-height: 450px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
        }

        #qrcode img,
        #qrcode canvas {
            max-width: 100%;
            height: auto;
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.08));
        }

        .qr-label {
            font-size: 0.9rem;
            font-weight: 700;
            color: #667eea;
            text-align: center;
            margin-bottom: 1.25rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
<div class="page">
    <h1>Appointment QR Generator</h1>
    <div class="card">
        <div class="layout">
            <div class="left-section">
                <label for="title">Title</label>
                <select id="title">
                    <option>Delphi Rise - Individual Session</option>
                    <option>Delphi Rise - Group Session</option>
                </select>

                <label for="date">Date</label>
                <input id="date" type="date">

                <label for="startTime">Start Time</label>
                <input id="startTime" type="time">

                <label for="endTime">End Time</label>
                <input id="endTime" type="time">

                <label for="location">Location</label>
                <input id="location" type="text" value="72 Hinchey Road, Rochester, NY 14624" readonly>

                <label for="description">Description</label>
                <input id="description" type="text" value="Phone: 585-467-2230" readonly>

                <div class="small">QR payload includes a calendar event with a default reminder 12 hours before the appointment.</div>
            </div>

            <div class="right-section">
                <div class="qr-label">Scan to Add Event</div>
                <div id="qrcode"></div>
                
                <label for="qrMode" style="margin-top: 2rem;">QR Type</label>
                <select id="qrMode">
                    <option value="appointment">Show Appointment QR</option>
                    <option value="contact">Show Delphi Rise Contact QR</option>
                </select>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
    const FIXED_LOCATION = "72 Hinchey Road, Rochester, NY 14624";
    const FIXED_DESCRIPTION = "Phone: 585-467-2230";
    const CONTACT_VCF_URL = "https://therapytools.github.io/notes/delphi-rise-contact.vcf";

    function pad(value) {
        return String(value).padStart(2, "0");
    }

    function formatDateForICS(dateStr, timeStr) {
        const [year, month, day] = dateStr.split("-");
        const [hour, minute] = timeStr.split(":");
        return `${year}${month}${day}T${pad(hour)}${pad(minute)}00`;
    }

    function escapeICS(text) {
        return String(text)
            .replace(/\\/g, "\\\\")
            .replace(/\n/g, "\\n")
            .replace(/,/g, "\\,")
            .replace(/;/g, "\\;");
    }

    // No longer embed full vCard in QR; we point to a hosted .vcf instead

    function buildIcsString({ title, date, startTime, endTime, location, description }) {
        const dtStart = formatDateForICS(date, startTime);
        const dtEnd = formatDateForICS(date, endTime);
        const now = new Date();
        const stamp = `${now.getUTCFullYear()}${pad(now.getUTCMonth() + 1)}${pad(now.getUTCDate())}T${pad(now.getUTCHours())}${pad(now.getUTCMinutes())}${pad(now.getUTCSeconds())}Z`;
        const uid = `delphi-${Date.now()}-${Math.random().toString(16).slice(2)}@delphirise`;

        return [
            "BEGIN:VCALENDAR",
            "VERSION:2.0",
            "PRODID:-//Delphi Rise//Appointment QR//EN",
            "CALSCALE:GREGORIAN",
            "METHOD:PUBLISH",
            "BEGIN:VEVENT",
            `UID:${uid}`,
            `DTSTAMP:${stamp}`,
            `SUMMARY:${escapeICS(title)}`,
            `DTSTART:${dtStart}`,
            `DTEND:${dtEnd}`,
            `LOCATION:${escapeICS(location)}`,
            `DESCRIPTION:${escapeICS(description)}`,
            "BEGIN:VALARM",
            "ACTION:DISPLAY",
            "DESCRIPTION:Appointment reminder",
            "TRIGGER:-PT12H",
            "END:VALARM",
            "END:VEVENT",
            "END:VCALENDAR"
        ].join("\r\n");
    }

    function getEventFromInputs() {
        return {
            title: document.getElementById("title").value,
            date: document.getElementById("date").value,
            startTime: document.getElementById("startTime").value,
            endTime: document.getElementById("endTime").value,
            location: FIXED_LOCATION,
            description: FIXED_DESCRIPTION
        };
    }

    function validateEvent(eventData) {
        if (!eventData.date || !eventData.startTime || !eventData.endTime) {
            return "Please enter date, start time, and end time.";
        }
        if (eventData.endTime <= eventData.startTime) {
            return "End time must be later than start time.";
        }
        return "";
    }

    function updateQr() {
        const qrcodeContainer = document.getElementById("qrcode");
        const qrLabel = document.querySelector(".qr-label");
        const mode = document.getElementById("qrMode").value;

        qrcodeContainer.innerHTML = "";

        if (mode === "contact") {
            qrLabel.textContent = "Scan to Add Contact";

            if (!window.QRCode) {
                qrcodeContainer.innerHTML = `<div style="color: #dc2626; font-weight: 600; text-align: center;">QR library failed to load.</div>`;
                return;
            }

            new QRCode(qrcodeContainer, {
                text: CONTACT_VCF_URL,
                width: 380,
                height: 380,
                correctLevel: QRCode.CorrectLevel.M
            });
            return;
        }

        // Appointment mode
        qrLabel.textContent = "Scan to Add Event";
        const eventData = getEventFromInputs();
        const error = validateEvent(eventData);

        if (error) {
            qrcodeContainer.innerHTML = `<div style="color: #dc2626; font-weight: 600; text-align: center;">${error}</div>`;
            return;
        }

        const icsPayload = buildIcsString(eventData);

        if (!window.QRCode) {
            qrcodeContainer.innerHTML = `<div style="color: #dc2626; font-weight: 600; text-align: center;">QR library failed to load.</div>`;
            return;
        }

        new QRCode(qrcodeContainer, {
            text: icsPayload,
            width: 380,
            height: 380,
            correctLevel: QRCode.CorrectLevel.M
        });
    }

    function runBuilderMode() {
        const now = new Date();
        const plusOneHour = new Date(now.getTime() + 60 * 60 * 1000);

        const dateValue = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}`;
        const startValue = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
        const endValue = `${pad(plusOneHour.getHours())}:${pad(plusOneHour.getMinutes())}`;

        const dateInput = document.getElementById("date");
        const startInput = document.getElementById("startTime");
        const endInput = document.getElementById("endTime");

        dateInput.value = dateValue;
        startInput.value = startValue;
        endInput.value = endValue;

        ["title", "date", "startTime", "endTime"].forEach((id) => {
            document.getElementById(id).addEventListener("input", updateQr);
            document.getElementById(id).addEventListener("change", updateQr);
        });

        document.getElementById("qrMode").addEventListener("change", updateQr);
        updateQr();
    }

    (function init() {
        runBuilderMode();
    })();
</script>
</body>
</html>
